apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: backend-secret
  namespace: employee-portal

spec:

  refreshInterval: 1m

  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore

  target:
    name: backend-secret

  data:

  - secretKey: DB_USERNAME
    remoteRef:
      key: employee-db-user

  - secretKey: DB_PASSWORD
    remoteRef:
      key: employee-db-password